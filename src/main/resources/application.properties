spring.application.name=demo
server.port=8083

spring.datasource.url=jdbc:mysql://127.0.0.1:3306/Inventory?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

inventory.alert.low-stock-threshold=10
inventory.alert.supply-chain-max-delay-days=14